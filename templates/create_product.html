<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Product</title>
  <!-- Include Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* Custom CSS for the modal submit button position */
    .modal-footer {
      position: absolute;
      bottom: 10px;
      right: 20px;
    }
    .modal-content {
      position: relative;
      padding-bottom: 50px;
    }
  </style>
</head>
<body>
  <!-- Button to trigger modal -->
  <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createProductModal">
    Create Product
  </button>

  <!-- Modal -->
  <div class="modal fade" id="createProductModal" tabindex="-1" aria-labelledby="createProductModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="createProductModalLabel">Create Product</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form method="POST">
            {% csrf_token %}
            <div class="row">
              <!-- Product Name -->
              <div class="col-md-6 mb-3">
                <label for="custom_code" class="form-label">ABL Code:</label>
                <input type="text" name="custom_code" id="custom_code" class="form-control" placeholder="Enter custom code">
              </div>

              <div class="col-md-6 mb-3">
                <label for="name" class="form-label">Product Name:</label>
                <input type="text" name="name" id="name" class="form-control" placeholder="Enter product name" required>
              </div>
            </div>

            <div class="row">
              <!-- Description -->
              <div class="col-md-6 mb-3">
                <label for="description" class="form-label">Description:</label>
                <textarea name="description" id="description" class="form-control" placeholder="Enter product description" required></textarea>
              </div>

              <!-- Actual Price -->
            <label for="stock_quantity">Stock Quantity:</label>
            <input type="number" name="stock_quantity" required>
            
            <div class="row">
              <!-- Price 1 -->
              <div class="col-md-4 mb-3">
                <label for="price1" class="form-label">Price 1:</label>
                <input type="number" name="price1" id="price1" class="form-control" placeholder="Enter price 1" step="0.01" required>
              </div>

              <!-- Price 2 -->
              <div class="col-md-4 mb-3">
                <label for="price2" class="form-label">Price 2:</label>
                <input type="number" name="price2" id="price2" class="form-control" placeholder="Enter price 2" step="0.01">
              </div>

              <!-- Price 3 -->
              <div class="col-md-4 mb-3">
                <label for="price3" class="form-label">Price 3:</label>
                <input type="number" name="price3" id="price3" class="form-control" placeholder="Enter price 3" step="0.01">
              </div>
            </div>

            <!-- Vendor -->
            <div class="col-md-12 mb-3">
              <label for="vendor" class="form-label">Vendor:</label>
              <select name="vendor" id="vendor" class="form-select" required>
                <option value="" disabled selected>Select Vendor</option>
                {% for vendor in vendors %}
                  <option value="{{ vendor.id }}">{{ vendor.name }}</option>
                {% endfor %}
              </select>
            </div>

          </form>
        </div>

        <div class="modal-footer">
          <!-- Submit Button -->
          <button type="submit" class="btn btn-primary">Create Product</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Include Bootstrap JS and Popper.js -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
</body>
</html>
