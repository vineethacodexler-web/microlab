<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Top Bar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <style>
    .custom-top-bar {
      background-color: #f7f9fc;
      color: #000;
      font-size: 14px;
    }

    .custom-top-bar a {
      color: #0c63e4;
      font-weight: 500;
    }

    .custom-top-bar .text-success {
      color: #25D366 !important; /* WhatsApp green */
    }

    .custom-top-bar i {
      font-size: 13px;
    }

    .custom-top-bar .support-icon {
      transform: scaleX(-1);
      display: inline-block;
    }
  </style>
</head>
<body>

<div class="fixed-top border-bottom shadow-sm py-1 px-3 d-flex justify-content-between align-items-center custom-top-bar">
  <!-- Left Side -->
  <div class="d-flex align-items-center gap-3">
    <!-- <img src="https://via.placeholder.com/20x20.png?text=V" alt="Logo" style="width: 20px; height: 20px;">
    <span>Company</span>
    <a href="/help" class="text-decoration-none">Help</a>
    <a href="#" class="text-decoration-none">Shortcuts</a>
    <i class="fas fa-sync-alt"></i> -->
  </div>

  <!-- Right Side -->
  <div class="d-flex align-items-center gap-3">
    <span class="text-dark">Customer Support :</span>

    <a href="tel:+918078009715" class="text-decoration-none d-flex align-items-center">
      <i class="fas fa-phone-alt me-1 support-icon"></i> <span style="color:#61abcf">(+91) 8281913842</span>
    </a>

    <a href="https://wa.me/919999999999" target="_blank" class="text-decoration-none d-flex align-items-center text-success">
      <i class="fab fa-whatsapp me-1"></i><span style="color:#61abcf">(+91) 8281913842</span>
    </a>
  </div>
</div>

<!-- Spacer to offset fixed header -->
<div style="height: 48px;"></div>

</body>
</html>
