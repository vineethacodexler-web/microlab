{% if messages %}
<div id="toast-container" class="position-fixed top-0 end-0 p-3" style="z-index: 1055;">
    {% for message in messages %}
        {% if forloop.last %}
            {% if "deleted" in message|stringformat:"s"|lower %}
                <div id="last-toast" class="toast align-items-center text-white bg-danger border-0 mb-2"
                     role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="4000">
            {% else %}
                <div id="last-toast" class="toast align-items-center text-white bg-{{ message.tags }} border-0 mb-2"
                     role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="4000">
            {% endif %}
                    <div class="d-flex" style="background-color: rgb(236, 214, 214);">
                        <div class="toast-body" style="color: black;">
                            {{ message }}
                        </div>
                        <button type="button" class="btn-close btn-close-white me-2 m-auto"style="color: black;" data-bs-dismiss="toast" aria-label="Close"></button>
                    </div>
                </div>
        {% endif %}
    {% endfor %}
</div>
{% endif %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
    const lastToastEl = document.getElementById('last-toast');
    if (lastToastEl) {
        const toast = new bootstrap.Toast(lastToastEl);
        toast.show();
    }
});
</script>
