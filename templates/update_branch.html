{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medilab</title>
  <meta name="description" content="">
  <meta name="keywords" content="">

  <!-- Favicon -->
  <link rel="icon" href="{% static 'logo.png' %}">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700|Nunito:300,400,600,700|Poppins:300,400,500,600,700" rel="stylesheet">

  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css" crossorigin="anonymous">

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

  <!-- Local and Vendor CSS -->
  <link rel="stylesheet" href="{% static 'assets/vendor/bootstrap-icons/bootstrap-icons.css' %}">
  <link rel="stylesheet" href="{% static 'assets/vendor/boxicons/css/boxicons.min.css' %}">
  <link rel="stylesheet" href="{% static 'assets/vendor/quill/quill.snow.css' %}">
  <link rel="stylesheet" href="{% static 'assets/vendor/remixicon/remixicon.css' %}">
  <link rel="stylesheet" href="{% static 'assets/vendor/simple-datatables/style.css' %}">
  <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
</head>

<body>
  <header id="header" class="header fixed-top d-flex align-items-center">
    <div class="d-flex align-items-center justify-content-between">
      <a href="#"><img src="{% static 'logo.png' %}" width="250" height="50" alt="Medilab Logo"></a>
      <i class="bi bi-list toggle-sidebar-btn"></i>
    </div>
    <div class="search-bar">
      <p style="font-size:20px;">Welcome, {{ bok.First_name }}</p>
    </div>
    <nav class="header-nav ms-auto">
      <ul class="d-flex align-items-center">
        <li class="nav-item dropdown pe-3">
          <a class="nav-link nav-profile d-flex align-items-center pe-0" href="#" data-bs-toggle="dropdown">
            <img src="/media/{{ bok.Image }}" alt="" width="30">
            <span class="d-none d-md-block dropdown-toggle ps-2">{{ bok.First_name }}</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end dropdown-menu-arrow profile">
            <li class="dropdown-header">
              <img src="/media/{{ bok.Image }}" alt="" width="100">
              <h6>{{ bok.First_name }}</h6>
              <span>{{ bok.Email }}</span>
            </li>
            <li><hr class="dropdown-divider"></li>
            <li>
              <a class="dropdown-item d-flex align-items-center" href="{% url 'edit_admin' %}">
                <i class="bi bi-person-gear"></i>
                <span>Account Settings</span>
              </a>
            </li>
            <li><hr class="dropdown-divider"></li>
            <li>
              <a class="dropdown-item d-flex align-items-center" href="{% url 'logout' %}">
                <i class="bi bi-box-arrow-right"></i>
                <span>Sign Out</span>
              </a>
            </li>
          </ul>
        </li>
      </ul>
    </nav>
  </header>

  <aside id="sidebar" class="sidebar" style="background-color: #161f2e;">
    <ul class="sidebar-nav" id="sidebar-nav">
      <li class="nav-item">
        <a class="nav-link {% if request.resolver_match.url_name == 'admin_home' %}active{% endif %}" href="{% url 'admin_home' %}" style="background-color: #161f2e; color: white;">
          <i class="bi bi-speedometer2" style="color: white;"></i> Dashboard
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if request.resolver_match.url_name == 'branch_create' %}active{% endif %}" href="{% url 'branch_create' %}" style="background-color: #161f2e; color: white;">
          <i class="fas fa-users" style="color:white;"></i> Add Branch
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if request.resolver_match.url_name == 'register_employee' %}active{% endif %}" href="{% url 'register_employee' %}" style="background-color: #161f2e; color: white;">
          <i class="fas fa-users" style="color:white;"></i> Add Staff
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if request.resolver_match.url_name == 'view_staffs' %}active{% endif %}" href="{% url 'view_staffs' %}" style="background-color: #161f2e; color: white;">
          <i class="fas fa-users" style="color:white;"></i> View Staffs
        </a>
      </li>
    </ul>
  </aside>

  <style>
    .nav-link.active {
      background-color: #1e2a3a !important; /* Highlighted background */
      color: #f8f9fa !important; /* Light text */
      font-weight: bold;
      border-left: 4px solid #007bff; /* Blue accent */
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'assets/js/main.js' %}"></script>
</body>

</html>

<!-- Branch Form -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ action }} Branch</title>

    <!-- Add your CSS link here -->
    <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
</head>
<body>
    <main id="main" class="main">
        <h1>{{ action }} Branch</h1>
        <form method="post">
            {% csrf_token %}
            <label for="location">Location:</label>
            <input type="text" id="location" name="location" value="{{ branch.location }}" required>
            <br><br>
            <button type="submit">{{ action }}</button>
            <a href="{% url 'branch_list' %}">Cancel</a>
        </form>
    </main>
</body>
</html>
