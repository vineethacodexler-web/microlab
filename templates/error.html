<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 Not Found</title>
  <style>
    /* Reset some default styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body, html {
      height: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f8f9fa;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 600px;
    }
    h1 {
      font-size: 10rem;
      color: #ff6b6b;
      margin-bottom: 20px;
      font-weight: 900;
      letter-spacing: 8px;
      text-shadow: 2px 2px 8px rgba(255, 107, 107, 0.4);
    }
    h2 {
      font-size: 2rem;
      margin-bottom: 15px;
      color: #222;
    }
    p {
      font-size: 1.1rem;
      margin-bottom: 25px;
      color: #666;
    }
    a {
      display: inline-block;
      padding: 12px 30px;
      font-size: 1rem;
      color: white;
      background-color: #ff6b6b;
      border-radius: 30px;
      text-decoration: none;
      transition: background-color 0.3s ease;
      box-shadow: 0 4px 10px rgba(255, 107, 107, 0.3);
    }
    a:hover {
      background-color: #ff3b3b;
      box-shadow: 0 6px 15px rgba(255, 59, 59, 0.5);
    }
    @media (max-width: 480px) {
      h1 {
        font-size: 6rem;
      }
      h2 {
        font-size: 1.5rem;
      }
      p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>Oops! Page Not Found</h2>
    <p>The page you are looking for might have been removed or is temporarily unavailable.</p>
    <a href="/">Go to Homepage</a>
  </div>
</body>
</html>
