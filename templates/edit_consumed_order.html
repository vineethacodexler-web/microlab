{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Consumed Order</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <style>
        .table th, .table td {
            vertical-align: middle;
            text-align: center;
        }
        .bg-light-blue {
            background-color: #e9f2ff;
        }
    </style>
</head>
<body>
{% include 'branch_navbar.html' %}

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4><strong>Edit Consumed Order #{{ po.id }}</strong></h4>
        <a href="{% url 'view_consumed_orders' %}" class="btn btn-primary">Back to Orders</a>
    </div>

    {% include 'messages.html' %}

    <form method="POST">
        {% csrf_token %}
        <input type="hidden" name="invoice_number" value="{{ po.invoice_number }}">
        <input type="hidden" name="company" value="{{ po.company }}">
        <input type="hidden" id="vendor" name="vendor_id" value="{{ po.vendor.id }}">

        <!-- Vendor Selection -->
        <div class="mb-3">
            <label for="vendor_id" class="form-label">Vendor</label>
            <select class="form-select" id="vendor_id" name="vendor_id" required>
                <option value="">-- Select Vendor --</option>
                {% for vendor in vendors %}
                    <option value="{{ vendor.id }}" {% if vendor.id == po.vendor.id %}selected{% endif %}>{{ vendor.name }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Line Items Editing Table -->
        <h5><strong>Line Items</strong></h5>
        <table class="table table-bordered bg-light-blue" id="lineItemsTable">
            <thead class="table-primary">
                <tr>
                    <th>Item</th>
                    <th>Price</th>
                    <th>Pack</th>
                    <th>Stock</th>
                    <th>GST</th>
                    <th>HSN</th>
                    <th>QTY</th>
                    <th>Remove</th>
                </tr>
            </thead>
            <tbody>
                {% for line in po.consumed_lines.all %}
                <tr>
                    <td>
                        <input type="text" name="item_name[]" class="form-control" value="{{ line.item.name }}" required>

                    </td>
                    <td><input type="number" name="price[]" value="{{ line.price }}" class="form-control" step="0.01" required></td>
                    <td><input type="text" name="pack[]" value="{{ line.pack }}" class="form-control"></td>
                    <td><input type="number" name="stock[]" value="{{ line.stock }}" class="form-control" step="0.01"></td>
                    <td><input type="number" name="gst[]" value="{{ line.gst }}" class="form-control" step="0.01"></td>
                    <td><input type="text" name="hsn[]" value="{{ line.hsn }}" class="form-control"></td>
                    <td><input type="number" name="qty[]" value="{{ line.qty }}" class="form-control" step="0.01" required></td>
                    <td><button type="button" class="btn btn-danger btn-sm" onclick="this.closest('tr').remove()">Remove</button></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <!-- Add New Line Button -->
        <!-- <button type="button" class="btn btn-secondary mb-3" id="addLineBtn">+ Add Line</button> -->

        <!-- Submit -->
        <div class="mt-3">
            <button type="submit" class="btn btn-success">Update Order</button>
            <a href="{% url 'view_consumed_orders' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

<!-- JavaScript for Add Line -->
<script>
    const itemOptions = `
        {% for item in items %}
            <option value="{{ item.id }}">{{ item.name }}</option>
        {% endfor %}
    `;

    document.getElementById('addLineBtn').addEventListener('click', function () {
        const newRow = `
            <tr>
                <td><select name="item_id[]" class="form-select" required>${itemOptions}</select></td>
                <td><input type="number" name="price[]" class="form-control" step="0.01" required></td>
                <td><input type="text" name="pack[]" class="form-control"></td>
                <td><input type="number" name="stock[]" class="form-control" step="0.01"></td>
                <td><input type="number" name="gst[]" class="form-control" step="0.01"></td>
                <td><input type="text" name="hsn[]" class="form-control"></td>
                <td><input type="number" name="qty[]" class="form-control" step="0.01" required></td>
                <td><button type="button" class="btn btn-danger btn-sm" onclick="this.closest('tr').remove()">Remove</button></td>
            </tr>
        `;
        document.querySelector('#lineItemsTable tbody').insertAdjacentHTML('beforeend', newRow);
    });
</script>

<!-- Font Awesome (optional) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</body>
</html>
