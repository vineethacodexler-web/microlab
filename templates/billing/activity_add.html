{% include 'admin_navbar.html' %}

<div class="main-content">

    <div class="card">

        <div class="card-header">
            Add Billing Activity
        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">

                    <label>Name</label>

                    <input
                        type="text"
                        name="name"
                        class="form-control"
                        required
                    >

                </div>

                <div class="mb-3">

                    <label>Code</label>

                   <input type="text"
       name="code"
       class="form-control"
       placeholder="Example: EMAIL_SENT"
       required>

<small class="text-muted">
Use uppercase with underscores.
</small>

                </div>

                <div class="mb-3">

                    <label>Charge</label>

                    <input
                        type="number"
                        step="0.01"
                        name="charge"
                        class="form-control"
                        required
                    >

                </div>

                <div class="mb-3">

                    <label>Description</label>

                    <textarea
                        name="description"
                        class="form-control"
                    ></textarea>

                </div>

                <button class="btn btn-success">

                    Save Activity

                </button>

            </form>

        </div>

    </div>

</div>
