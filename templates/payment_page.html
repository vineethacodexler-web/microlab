<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Summary</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Razorpay -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
        body {
            background: #f5f7fa;
        }
        .payment-card {
            max-width: 500px;
            margin: 60px auto;
            border-radius: 15px;
        }
        .price-box {
            font-size: 28px;
            font-weight: bold;
            color: #28a745;
        }
        .btn-pay {
            font-size: 18px;
            padding: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card shadow payment-card p-4">

        <h3 class="text-center mb-4">💳 Payment Summary</h3>

        <div class="text-center mb-3">
            <span class="badge bg-primary">Monthly Plan</span>
        </div>

        <ul class="list-group list-group-flush mb-3">
            <li class="list-group-item d-flex justify-content-between">
                <span>Plan</span>
                <strong>Monthly</strong>
            </li>
            <li class="list-group-item d-flex justify-content-between">
                <span>Amount</span>
                <strong class="text-success">₹{{ amount }}</strong>
            </li>
            <li class="list-group-item d-flex justify-content-between">
                <span>Start Date</span>
                <strong>{{ today }}</strong>
            </li>
            <li class="list-group-item d-flex justify-content-between">
                <span>Next Billing</span>
                <strong>{{ next_due }}</strong>
            </li>
        </ul>

        <div class="text-center mb-3">
            <div class="price-box">₹{{ amount }}</div>
            <small class="text-muted">per month</small>
        </div>

        <button id="pay-btn" class="btn btn-success w-100 btn-pay">
            Pay Now
        </button>

    </div>
</div>

<script>
document.getElementById("pay-btn").onclick = function () {

    fetch("/create-order/")
    .then(res => res.json())
    .then(data => {

        var options = {
            "key": "{{ RAZORPAY_KEY_ID }}",
            "amount": data.amount,
            "currency": "INR",
            "name": "Your Company",
            "description": "Monthly Plan ₹500",
            "order_id": data.order_id,

            "handler": function (response){
                fetch("/payment-success/", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-CSRFToken": "{{ csrf_token }}"
                    },
                    body: JSON.stringify(response)
                }).then(() => {
                    window.location.href = "dashboard";
                });
            },

            "theme": {
                "color": "#28a745"
            }
        };

        var rzp = new Razorpay(options);
        rzp.open();
    });
};
</script>

</body>
</html>
